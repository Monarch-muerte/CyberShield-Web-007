<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CyberShield Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
  <div class="container-fluid">
    <a class="navbar-brand ms-2 fw-bold" href="index.html">CyberShield</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
        <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<header class="bg-dark text-white text-center d-flex flex-column justify-content-center align-items-center vh-100">
  <h1 class="display-3 fw-bold fade-in">CyberShield Security Tools</h1>
  <p class="lead fade-in">Your trusted companion in the digital world</p>
  <a href="#tools" class="btn btn-outline-info mt-3">Explore Tools ↓</a>
</header>

<!-- Tools Section -->
<div id="tools" class="container my-5">
  <div class="row g-4">
    <!-- Password Generator -->
    <div class="col-md-6 fade-in">
      <div class="card p-3 shadow h-100">
        <h4>🔑 Password Generator</h4>
        <input type="text" id="generatedPassword" class="form-control mb-2" readonly>
        <button class="btn btn-primary" onclick="generatePassword()">Generate Password</button>
      </div>
    </div>

    <!-- Password Strength Checker -->
    <div class="col-md-6 fade-in">
      <div class="card p-3 shadow h-100">
        <h4>🔍 Password Strength Checker</h4>
        <input type="password" id="passwordInput" class="form-control mb-2" placeholder="Enter password">
        <div id="strengthResult" class="fw-bold"></div>
      </div>
    </div>

    <!-- Malicious Link Checker -->
    <div class="col-md-6 fade-in">
      <div class="card p-3 shadow h-100">
        <h4>⚠️ Malicious Link Checker</h4>
        <input type="text" id="linkInput" class="form-control mb-2" placeholder="Enter URL">
        <button class="btn btn-danger" onclick="checkLink()">Check Link</button>
        <div id="linkResult" class="mt-2"></div>
      </div>
    </div>

    <!-- Encryption / Decryption -->
    <div class="col-md-6 fade-in">
      <div class="card p-3 shadow h-100">
        <h4>🔒 Encryption & Decryption</h4>
        <textarea id="cryptoInput" class="form-control mb-2" placeholder="Enter text"></textarea>
        <button class="btn btn-success mb-2" onclick="encryptText()">Encrypt</button>
        <button class="btn btn-warning" onclick="decryptText()">Decrypt</button>
        <div id="cryptoResult" class="mt-2"></div>
      </div>
    </div>
  </div>
</div>

<!-- Email Breach Checker -->
<div class="row justify-content-center my-5 fade-in">
  <div class="col-md-6 d-flex align-items-stretch">
    <div class="card p-4 shadow w-100 text-center">
      <h4 class="mb-3">🛡️ Email Breach Checker</h4>
      <input type="email" id="emailInput" class="form-control mb-3" placeholder="Enter your email">
      <button class="btn btn-info w-100 mb-2" onclick="checkEmailBreach()">Check Breach</button>
      <div id="emailResult" class="mt-2 fw-semibold"></div>
      <a href="https://haveibeenpwned.com" target="_blank" class="btn btn-outline-info mt-3">Learn More →</a>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-auto">
  <p>© 2026 CyberShield Inc.</p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
